name: Java CI with Maven

on:
  push:
    branches: [ "main" ] # Triggers the pipeline every time you push code
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      # This runs your JUnit tests automatically (Task 3 requirement)
      run: mvn -B clean test 

    - name: Package JAR
      # This creates the file needed for the Docker step later
      run: mvn -B package -DskipTests